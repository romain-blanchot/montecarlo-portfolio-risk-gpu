default_language_version:
  python: python3.13

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        args: [src/]
        pass_filenames: false

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: /home/talleyrand/anaconda3/bin/conda run -n portfolio-risk-engine pytest
        language: system
        pass_filenames: false
