services:
  portfolio-sim:
    image: ghcr.io/romain-blanchot/montecarlo-portfolio-risk-gpu:main
    container_name: portfolio-risk-engine-prod
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./outputs:/app/outputs
