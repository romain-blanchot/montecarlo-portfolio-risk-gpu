site_name: Portfolio Risk Engine
site_url: https://romain-blanchot.github.io/montecarlo-portfolio-risk-gpu/
site_description: GPU-accelerated Monte Carlo engine for multi-asset portfolio risk simulation
site_author: Romain Blanchot

repo_name: montecarlo-portfolio-risk-gpu
repo_url: https://github.com/romain-blanchot/montecarlo-portfolio-risk-gpu

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started.md
  - User Guide:
      - Simulation Pipeline: user-guide/pipeline.md
      - CLI Reference: user-guide/cli.md
      - GPU Acceleration: user-guide/gpu.md
  - Concepts:
      - Architecture: architecture.md
      - Glossary: glossary.md
  - Benchmarks: benchmarks.md
  - Development: development.md
  - API Reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            members_order: source

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  version:
    provider: mike
    default: latest
