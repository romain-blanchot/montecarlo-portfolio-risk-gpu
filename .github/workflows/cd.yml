name: CD

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  cd-docker-release:
    name: Tag Docker release image
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $TAG"

      - name: Login to GHCR
        if: steps.get_tag.outputs.tag != ''
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag release image on GHCR
        if: steps.get_tag.outputs.tag != ''
        env:
          TAG_NAME: ${{ steps.get_tag.outputs.tag }}
          SHA_TAG: sha-${{ github.event.workflow_run.head_sha }}
        run: |
          docker pull "$REGISTRY/$IMAGE_NAME:$SHA_TAG"
          docker tag  "$REGISTRY/$IMAGE_NAME:$SHA_TAG" "$REGISTRY/$IMAGE_NAME:$TAG_NAME"
          docker tag  "$REGISTRY/$IMAGE_NAME:$SHA_TAG" "$REGISTRY/$IMAGE_NAME:latest"
          docker push "$REGISTRY/$IMAGE_NAME:$TAG_NAME"
          docker push "$REGISTRY/$IMAGE_NAME:latest"
