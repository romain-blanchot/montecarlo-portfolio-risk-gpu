name: CD

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  cd-docker-release:
    name: Tag Docker release image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag release image on GHCR
        env:
          TAG_NAME: ${{ github.ref_name }}
          SHA_TAG: sha-${{ github.sha }}
        run: |
          docker pull "$REGISTRY/$IMAGE_NAME:$SHA_TAG"
          docker tag  "$REGISTRY/$IMAGE_NAME:$SHA_TAG" "$REGISTRY/$IMAGE_NAME:$TAG_NAME"
          docker tag  "$REGISTRY/$IMAGE_NAME:$SHA_TAG" "$REGISTRY/$IMAGE_NAME:latest"
          docker push "$REGISTRY/$IMAGE_NAME:$TAG_NAME"
          docker push "$REGISTRY/$IMAGE_NAME:latest"
