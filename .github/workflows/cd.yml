name: Continuous Delivery

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # --- Release: changelog, tag, GitHub release ---
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: python

      # Re-tag the Docker image from GHCR with the release version
      - name: Login to GHCR
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag release image on GHCR
        if: ${{ steps.release.outputs.release_created }}
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          SHA_TAG: sha-${{ github.sha }}
        run: |
          docker pull "$REGISTRY/$IMAGE_NAME:$SHA_TAG"
          docker tag  "$REGISTRY/$IMAGE_NAME:$SHA_TAG" "$REGISTRY/$IMAGE_NAME:$TAG_NAME"
          docker tag  "$REGISTRY/$IMAGE_NAME:$SHA_TAG" "$REGISTRY/$IMAGE_NAME:latest"
          docker push "$REGISTRY/$IMAGE_NAME:$TAG_NAME"
          docker push "$REGISTRY/$IMAGE_NAME:latest"

  # --- Docs: deploy to GitHub Pages ---
  docs:
    name: Deploy docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -e .[dev]

      - name: Deploy docs to gh-pages
        run: mkdocs gh-deploy --force
