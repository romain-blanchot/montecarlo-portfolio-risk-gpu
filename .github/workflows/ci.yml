name: CI

# List :
# checkout
# setup python
# install deps

# format check
# lint

# unit tests
# integration tests

# sonar analysis

# build
# push artifcat

on:
  push:
    branches:
      - main
      - integration
  pull_request:
    branches:
      - main
      - integration

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -e .[dev]

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy src/

      - name: Run tests
        run: pytest tests

      - name: Install build dependencies
        run: python -m pip install --upgrade build

      - name: Build
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
